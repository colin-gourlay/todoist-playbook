name: Validate templates

on:
  push:
    branches: [ main ]
    paths:
      - csv-templates/**
      - prompt-templates/**
      - .github/scripts/generate_release_assets.py
      - .github/workflows/release.yml
      - .github/workflows/reusable-release-assets.yml
      - .github/workflows/validate-templates.yml
      - .github/workflows/reusable-validate-templates.yml
      - .github/scripts/project_colors.txt
  pull_request:
    branches: [ main ]
    paths:
      - csv-templates/**
      - prompt-templates/**
      - .github/scripts/generate_release_assets.py
      - .github/workflows/release.yml
      - .github/workflows/reusable-release-assets.yml
      - .github/workflows/validate-templates.yml
      - .github/workflows/reusable-validate-templates.yml
      - .github/scripts/project_colors.txt
  workflow_dispatch:
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-validate-templates.yml
