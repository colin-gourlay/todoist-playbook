name: Bump template version

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions: {}

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump template version
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python3 .github/scripts/bump_template_versions.py

      - name: Commit and push version bump
        uses: ./.github/actions/commit-and-push
        with:
          commit_message: "chore: bump template version(s)"
          add: "csv-templates/*/meta.yml prompt-templates/*/meta.yml"
          push_to: main
