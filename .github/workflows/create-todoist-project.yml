name: Create Todoist Project from Template

on:
  workflow_dispatch:
    inputs:
      template:
        description: Template to use
        required: false
        type: choice
        options:
          - ''
          - awesome-list-submission
          - azure-migration-assessment
          - code-review
          - daily-review
          - ef-code-review
          - exam-certification-workflow
          - house-admin
          - iteration-0
          - onboarding-checklist
          - one-on-one
          - radio-show-core
          - radio-show-guest-feature
          - radio-show-post-production
          - radio-show-promotion
          - radio-show-system
          - saas-spin-up
          - saas-wind-down
          - socials-health-and-optimization-checklist
          - sprint-retrospective
          - sprint-review
          - weekly-review
      project_name:
        description: Project name (leave blank to use the template's default name)
        required: false
        type: string
      color:
        description: Project colour (leave blank to use the template or system default)
        required: false
        type: choice
        options:
          - ''
          - berry_red
          - red
          - orange
          - yellow
          - olive_green
          - lime_green
          - green
          - mint_green
          - teal
          - sky_blue
          - light_blue
          - blue
          - grape
          - violet
          - lavender
          - magenta
          - salmon
          - charcoal
          - grey
          - taupe
      is_favorite:
        description: Mark the project as a favourite
        required: false
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
      parent_project:
        description: >
          Name of an existing Todoist project to nest this project under
          (leave blank to create a top-level project)
        required: false
        type: string

jobs:
  create-project:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Create Todoist project from CSV template
        # Leaving template blank defaults to the 'weekly-review' CSV template.
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          TEMPLATE: ${{ inputs.template || 'weekly-review' }}
          PROJECT_NAME: ${{ inputs.project_name }}
          PROJECT_COLOR: ${{ inputs.color }}
          IS_FAVORITE: ${{ inputs.is_favorite }}
          PARENT_PROJECT: ${{ inputs.parent_project }}
        run: python3 .github/scripts/create_todoist_project.py
