name: Create Todoist Project from Template

on:
  schedule:
    - cron: '0 15 * * 5'
    - cron: '0 18 * * 0'
  workflow_dispatch:
    inputs:
      template:
        description: CSV template to use
        required: false
        type: choice
        options:
          - ''
          - awesome-list-outreach-shortlist
          - awesome-list-submission
          - azure-migration-assessment
          - code-review
          - code-review-checklist
          - daily-review
          - ef-code-review
          - exam-certification-workflow
          - github-repo-spin-up
          - house-admin
          - iteration-0
          - onboarding-checklist
          - one-on-one
          - artist-interview-invite-workflow
          - radio-show-core
          - radio-show-guest-feature
          - radio-show-post-production
          - radio-show-promotion
          - radio-show-system
          - repo-ecosystem-watch
          - repo-profile-audit
          - saas-spin-up
          - saas-wind-down
          - socials-health-and-optimization-checklist
          - sprint-retrospective
          - sprint-review
          - weekly-close
          - weekly-commitment-reset
          - weekly-plan
          - weekly-review
      project_name:
        description: Project name (leave blank to use the CSV template's default name)
        required: false
        type: string
      color:
        description: Project colour (leave blank to use the CSV template or system default)
        required: false
        type: choice
        options:
          - ''
          - berry_red
          - red
          - orange
          - yellow
          - olive_green
          - lime_green
          - green
          - mint_green
          - teal
          - sky_blue
          - light_blue
          - blue
          - grape
          - violet
          - lavender
          - magenta
          - salmon
          - charcoal
          - grey
          - taupe
      is_favorite:
        description: Mark the project as a favourite
        required: false
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
      parent_project:
        description: >
          Existing Todoist project to nest this project under
          (select the empty option to create a top-level project).
          Run the "Sync Todoist Project List" workflow to refresh this list.
        required: false
        type: choice
        options:
          # BEGIN_TODOIST_PROJECTS (auto-updated by the sync-todoist-projects workflow)
          - ''
          # END_TODOIST_PROJECTS

jobs:
  create-project:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Create Todoist project from CSV template
        # Leaving template blank defaults to:
        # - 'weekly-close' on Friday scheduled run
        # - 'weekly-plan' on Sunday scheduled run
        # - 'weekly-close' on manual runs
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          TEMPLATE: ${{ inputs.template || (github.event_name == 'schedule' && (github.event.schedule == '0 15 * * 5' && 'weekly-close' || 'weekly-plan')) || 'weekly-close' }}
          PROJECT_NAME: ${{ inputs.project_name }}
          PROJECT_COLOR: ${{ inputs.color }}
          IS_FAVORITE: ${{ inputs.is_favorite }}
          PARENT_PROJECT: ${{ inputs.parent_project }}
        run: python3 .github/scripts/create_todoist_project.py
