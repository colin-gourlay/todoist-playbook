name: Reusable — Validate Templates

on:
  workflow_call:
    inputs:
      templates_path:
        description: Path to the CSV templates directory.
        type: string
        default: csv-templates
      prompt_templates_path:
        description: Path to the prompt-templates directory.
        type: string
        default: prompt-templates

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Validate CSV template structure
        run: |
          set -euo pipefail

          TEMPLATES_PATH="${{ inputs.templates_path }}"

          mapfile -t valid_project_colors < .github/scripts/project_colors.txt

          if [ ! -d "$TEMPLATES_PATH" ]; then
            echo "❌ ${TEMPLATES_PATH}/ folder not found"
            exit 1
          fi

          failed=0

          for dir in "$TEMPLATES_PATH"/*/; do
            [ -d "$dir" ] || continue
            slug=$(basename "$dir")

            echo "🔎 Checking $slug"

            # -----------------------
            # 1. Kebab-case check
            # -----------------------
            if [[ ! "$slug" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
              echo "❌ Folder name must be kebab-case: $slug"
              failed=1
            fi

            # -----------------------
            # 2. Required files
            # -----------------------
            for file in template.csv meta.yml README.md; do
              if [ ! -f "${dir}${file}" ]; then
                echo "❌ Missing ${file} in ${dir}"
                failed=1
              fi
            done

            # -----------------------
            # 3. meta.yml validation
            # -----------------------
            if [ -f "${dir}meta.yml" ]; then
              required_keys=("name:" "slug:" "description:" "category:" "tags:" "version:")

              for key in "${required_keys[@]}"; do
                if ! grep -q "^${key}" "${dir}meta.yml"; then
                  echo "❌ meta.yml missing key: ${key} in ${dir}"
                  failed=1
                fi
              done

              # slug match check
              meta_slug=$(grep "^slug:" "${dir}meta.yml" | head -n1 | sed 's/slug:[[:space:]]*//')
              meta_slug=$(echo "$meta_slug" | tr -d '"'\''')

              if [ "$meta_slug" != "$slug" ]; then
                echo "❌ meta.yml slug ($meta_slug) does not match folder ($slug)"
                failed=1
              fi

              # Optional project_color check
              if grep -q "^project_color:" "${dir}meta.yml"; then
                meta_color=$(grep "^project_color:" "${dir}meta.yml" | head -n1 | sed 's/project_color:[[:space:]]*//')
                meta_color=$(echo "$meta_color" | tr -d '"'\''')

                color_valid=0
                for valid_color in "${valid_project_colors[@]}"; do
                  if [ "$meta_color" = "$valid_color" ]; then
                    color_valid=1
                    break
                  fi
                done

                if [ "$color_valid" -ne 1 ]; then
                  echo "❌ Invalid project_color '$meta_color' in ${dir}meta.yml"
                  failed=1
                fi
              fi

              # Deprecation metadata contract
              has_deprecation_message=0
              has_replacement_template=0
              has_sunset_date=0

              if grep -q "^deprecation_message:" "${dir}meta.yml"; then
                has_deprecation_message=1
              fi
              if grep -q "^replacement_template:" "${dir}meta.yml"; then
                has_replacement_template=1
              fi
              if grep -q "^sunset_date:" "${dir}meta.yml"; then
                has_sunset_date=1
              fi

              meta_deprecated=""
              if grep -q "^deprecated:" "${dir}meta.yml"; then
                meta_deprecated=$(grep "^deprecated:" "${dir}meta.yml" | head -n1 | sed 's/deprecated:[[:space:]]*//')
                meta_deprecated=$(echo "$meta_deprecated" | tr -d '"'\''' | tr '[:upper:]' '[:lower:]')
              fi

              is_deprecated_truthy=0
              if [ "$meta_deprecated" = "true" ] || [ "$meta_deprecated" = "yes" ] || [ "$meta_deprecated" = "1" ] || [ "$meta_deprecated" = "on" ]; then
                is_deprecated_truthy=1
              fi

              if [ "$is_deprecated_truthy" -eq 1 ]; then
                if [ "$has_deprecation_message" -ne 1 ]; then
                  echo "❌ deprecated template missing deprecation_message in ${dir}meta.yml"
                  failed=1
                fi

                if [ "$has_replacement_template" -ne 1 ]; then
                  echo "❌ deprecated template missing replacement_template in ${dir}meta.yml"
                  failed=1
                else
                  meta_replacement_template=$(grep "^replacement_template:" "${dir}meta.yml" | head -n1 | sed 's/replacement_template:[[:space:]]*//')
                  meta_replacement_template=$(echo "$meta_replacement_template" | tr -d '"'\''' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

                  if [ -z "$meta_replacement_template" ]; then
                    echo "❌ replacement_template cannot be empty in ${dir}meta.yml"
                    failed=1
                  elif [[ ! "$meta_replacement_template" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
                    echo "❌ replacement_template must be kebab-case in ${dir}meta.yml"
                    failed=1
                  elif [ ! -d "${TEMPLATES_PATH}/${meta_replacement_template}" ]; then
                    echo "❌ replacement_template '${meta_replacement_template}' does not exist under ${TEMPLATES_PATH}/"
                    failed=1
                  fi
                fi

                if [ "$has_sunset_date" -ne 1 ]; then
                  echo "❌ deprecated template missing sunset_date in ${dir}meta.yml"
                  failed=1
                else
                  meta_sunset_date=$(grep "^sunset_date:" "${dir}meta.yml" | head -n1 | sed 's/sunset_date:[[:space:]]*//')
                  meta_sunset_date=$(echo "$meta_sunset_date" | tr -d '"'\''' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

                  if [ -z "$meta_sunset_date" ]; then
                    echo "❌ sunset_date cannot be empty in ${dir}meta.yml"
                    failed=1
                  elif [[ ! "$meta_sunset_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                    echo "❌ Invalid sunset_date '$meta_sunset_date' in ${dir}meta.yml (expected YYYY-MM-DD)"
                    failed=1
                  elif ! date -u -d "$meta_sunset_date" +%s >/dev/null 2>&1; then
                    echo "❌ Invalid sunset_date '$meta_sunset_date' in ${dir}meta.yml (unparseable date)"
                    failed=1
                  else
                    now_epoch=$(date -u +%s)
                    sunset_epoch=$(date -u -d "$meta_sunset_date 00:00:00Z" +%s)
                    if [ "$now_epoch" -ge "$sunset_epoch" ]; then
                      echo "❌ Deprecated template '$slug' reached sunset_date ($meta_sunset_date) and must be removed"
                      failed=1
                    fi
                  fi
                fi
              else
                if [ "$has_deprecation_message" -eq 1 ] || [ "$has_replacement_template" -eq 1 ] || [ "$has_sunset_date" -eq 1 ]; then
                  echo "❌ deprecation_message/replacement_template/sunset_date are only allowed when deprecated is truthy in ${dir}meta.yml"
                  failed=1
                fi
              fi
            fi

            # -----------------------
            # 4. README import steps check
            # -----------------------
            if [ -f "${dir}README.md" ]; then
              if ! grep -qiE "^## import instructions|import.*csv" "${dir}README.md"; then
                echo "❌ README.md does not contain import instructions in ${dir}"
                failed=1
              fi
            fi

            # -----------------------
            # 5. CSV validation
            # -----------------------
            if [ -f "${dir}template.csv" ]; then

              header=$(head -n1 "${dir}template.csv")

              if [[ "$header" != TYPE,* ]]; then
                echo "❌ template.csv must start with TYPE header in ${dir}"
                failed=1
              fi

              # Validate TYPE column values
              while read -r type; do
                if [ "$type" != "section" ] && [ "$type" != "task" ] && [ -n "$type" ]; then
                  echo "❌ Invalid TYPE '$type' in ${dir}template.csv"
                  failed=1
                fi
              done < <(awk -F',' 'NR>1 {print $1}' "${dir}template.csv")
            fi

          done

          if [ "$failed" -ne 0 ]; then
            echo "💥 Validation failed"
            exit 1
          fi

          echo "✅ All CSV templates validated successfully"

      - name: Validate prompt template structure
        run: |
          set -euo pipefail

          PROMPT_TEMPLATES_PATH="${{ inputs.prompt_templates_path }}"

          if [ ! -d "$PROMPT_TEMPLATES_PATH" ]; then
            echo "ℹ️  No ${PROMPT_TEMPLATES_PATH}/ folder found — skipping"
            exit 0
          fi

          failed=0

          for dir in "$PROMPT_TEMPLATES_PATH"/*/; do
            [ -d "$dir" ] || continue
            slug=$(basename "$dir")

            echo "🔎 Checking prompt template: $slug"

            # -----------------------
            # 1. Kebab-case check
            # -----------------------
            if [[ ! "$slug" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
              echo "❌ Folder name must be kebab-case: $slug"
              failed=1
            fi

            # -----------------------
            # 2. Required files
            # -----------------------
            for file in prompt.md meta.yml README.md; do
              if [ ! -f "${dir}${file}" ]; then
                echo "❌ Missing ${file} in ${dir}"
                failed=1
              fi
            done

            # -----------------------
            # 3. meta.yml validation
            # -----------------------
            if [ -f "${dir}meta.yml" ]; then
              required_keys=("name:" "slug:" "description:" "category:" "tags:" "version:" "inputs:")

              for key in "${required_keys[@]}"; do
                if ! grep -q "^${key}" "${dir}meta.yml"; then
                  echo "❌ meta.yml missing key: ${key} in ${dir}"
                  failed=1
                fi
              done

              # slug match check
              meta_slug=$(grep "^slug:" "${dir}meta.yml" | head -n1 | sed 's/slug:[[:space:]]*//')
              meta_slug=$(echo "$meta_slug" | tr -d '"'\''')

              if [ "$meta_slug" != "$slug" ]; then
                echo "❌ meta.yml slug ($meta_slug) does not match folder ($slug)"
                failed=1
              fi
            fi

            # -----------------------
            # 4. prompt.md validation
            # -----------------------
            if [ -f "${dir}prompt.md" ]; then
              if ! grep -q "{{" "${dir}prompt.md"; then
                echo "❌ prompt.md contains no {{placeholder}} variables in ${dir}"
                failed=1
              fi
            fi

          done

          if [ "$failed" -ne 0 ]; then
            echo "💥 Prompt template validation failed"
            exit 1
          fi

          echo "✅ All prompt templates validated successfully"
