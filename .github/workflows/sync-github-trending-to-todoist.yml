name: Sync GitHub Trending to Todoist

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      project_name:
        description: Project name
        required: false
        type: string
      languages:
        description: Language filter. Enter comma-separated values such as Bicep or Python,TypeScript
        required: false
        type: string

permissions: {}

jobs:
  trending-to-todoist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - name: Fetch trending repos and push to Todoist
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          PROJECT_NAME: ${{ inputs.project_name }}
          LANGUAGES: ${{ inputs.languages }}
        run: python3 .github/scripts/fetch_github_trending.py
