name: Sync GitHub Trending to Todoist

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      project_name:
        description: Project name
        required: false
        type: string
      languages:
        description: Language filter. Enter comma-separated values such as Bicep or Python,TypeScript
        required: false
        type: string

permissions: {}

jobs:
  trending-to-todoist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch trending repos and push to Todoist
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          PROJECT_NAME: ${{ inputs.project_name }}
          LANGUAGES: ${{ inputs.languages }}
        run: python3 .github/scripts/fetch_github_trending.py
