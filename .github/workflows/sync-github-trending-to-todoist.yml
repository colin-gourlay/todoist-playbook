name: Sync GitHub Trending to Todoist

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      project_name:
        description: Project name
        required: false
        type: string
      languages:
        description: Language filter. Enter comma-separated values such as Bicep or Python,TypeScript
        required: false
        type: string

permissions: {}

concurrency:
  group: sync-github-trending-to-todoist
  cancel-in-progress: false

jobs:
  import-trending-repos-to-todoist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch trending repos and push to Todoist
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          PROJECT_NAME: ${{ inputs.project_name }}
          LANGUAGES: ${{ inputs.languages }}
        run: python3 .github/scripts/fetch_github_trending.py

      - name: Upload processed slug state
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-trending-processed-state
          path: .github/data/github-trending-processed-slugs.json
          if-no-files-found: error

  commit-processed-state:
    runs-on: ubuntu-latest
    needs: import-trending-repos-to-todoist
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download processed slug state
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-trending-processed-state
          path: .github/data

      - name: Commit processed slug state if changed
        uses: ./.github/actions/commit-and-push
        with:
          commit_message: "chore: update github trending processed slug state [skip ci]"
          add: ".github/data/github-trending-processed-slugs.json"
