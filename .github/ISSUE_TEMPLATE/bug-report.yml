name: Bug Report
description: Report a bug or unexpected behaviour in the Todoist Playbook
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to report a bug or unexpected behaviour. Please include as much detail as possible so the issue can be reproduced and fixed.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: e.g. The create-todoist-project workflow fails with a 403 error when run manually.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behaviour.
      placeholder: |
        1. Go to Actions → Create Todoist Project from Template
        2. Select template 'weekly-review'
        3. Click Run workflow
        4. Observe the error in the run log
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
      placeholder: e.g. The project should be created successfully in Todoist.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Paste any relevant error messages or logs.
      placeholder: e.g. The workflow run failed with exit code 1 and the message "403 Forbidden".
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details (e.g. browser, OS, GitHub Actions runner).
      placeholder: e.g. GitHub Actions / ubuntu-latest / Python 3.11
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or links that may help.
    validations:
      required: false
