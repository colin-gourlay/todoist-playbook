  <rect x="264" y="296" width="16" height="16" rx="8" fill="none" stroke="#c8c4be" stroke-width="1.5"/>
  <text x="288" y="309" fill="#1a1a1a" font-size="13">Note wins and blockers</text>

  <!-- Section 3 -->
  <rect x="252" y="328" width="528" height="28" rx="4" fill="#f5f3ef"/>
  <text x="264" y="347" fill="#555148" font-size="12" font-weight="600">3️⃣ Plan Ahead</text>

