  <rect x="264" y="392" width="16" height="16" rx="8" fill="none" stroke="#dc4c3e" stroke-width="1.5"/>
  <text x="288" y="405" fill="#1a1a1a" font-size="13">Set three priorities for the week</text>
  <rect x="720" y="395" width="52" height="16" rx="4" fill="#fbe8e7"/>
  <text x="746" y="407" fill="#dc4c3e" font-size="10" font-weight="600" text-anchor="middle">P1</text>

  <rect x="264" y="420" width="16" height="16" rx="8" fill="none" stroke="#c8c4be" stroke-width="1.5"/>
  <text x="288" y="433" fill="#1a1a1a" font-size="13">Schedule focus blocks</text>

  <!-- Add task line -->
  <rect x="252" y="452" width="528" height="1" fill="#e8e5df"/>
  <text x="264" y="476" fill="#9e9587" font-size="13">+ Add task</text>
