  <!-- Section 1 -->
  <rect x="252" y="80" width="528" height="28" rx="4" fill="#f5f3ef"/>
  <text x="264" y="99" fill="#555148" font-size="12" font-weight="600">1️⃣ Capture &amp; Clarify</text>

  <!-- Tasks in section 1 -->
  <rect x="264" y="116" width="16" height="16" rx="8" fill="none" stroke="#dc4c3e" stroke-width="1.5"/>
