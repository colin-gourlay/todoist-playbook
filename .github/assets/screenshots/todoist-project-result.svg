  <rect x="720" y="119" width="52" height="16" rx="4" fill="#fbe8e7"/>
  <text x="746" y="131" fill="#dc4c3e" font-size="10" font-weight="600" text-anchor="middle">P1</text>

  <rect x="264" y="144" width="16" height="16" rx="8" fill="none" stroke="#dc4c3e" stroke-width="1.5"/>
  <text x="288" y="157" fill="#1a1a1a" font-size="13">Review flagged emails</text>
  <rect x="720" y="147" width="52" height="16" rx="4" fill="#fdf0d9"/>
